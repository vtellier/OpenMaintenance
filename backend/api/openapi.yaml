openapi: 3.0.3
info:
  title: OpenMaintenance API
  description: API for managing maintenance tasks, equipments, and interventions
  version: 1.0.0
servers:
  - url: http://localhost:3001/api
    description: Local development server
paths:
  /version:
    get:
      operationId: getVersion
      summary: Get application version
      tags:
        - System
      responses:
        '200':
          description: Version information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionInfo'
  /update-status:
    get:
      operationId: getUpdateStatus
      summary: Get update availability status
      tags:
        - System
      responses:
        '200':
          description: Update status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateStatus'
  /equipments:
    get:
      operationId: listEquipments
      summary: List all equipments
      description: Retrieve a list of all equipments
      tags:
        - Equipment
      responses:
        '200':
          description: A list of equipments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Equipment'
    post:
      operationId: createEquipment
      summary: Create a new equipment
      description: Add a new equipment to the system
      tags:
        - Equipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentInput'
      responses:
        '201':
          description: Equipment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Equipment'
        '400':
          description: Invalid input
  /equipments/{id}:
    get:
      operationId: getEquipment
      summary: Get equipment by ID
      description: Retrieve a single equipment by its ID
      tags:
        - Equipment
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: ID of the equipment
      responses:
        '200':
          description: Equipment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Equipment'
        '404':
          description: Equipment not found
    put:
      operationId: updateEquipment
      summary: Update an equipment
      description: Update an existing equipment
      tags:
        - Equipment
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: ID of the equipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentInput'
      responses:
        '200':
          description: Equipment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Equipment'
        '400':
          description: Invalid input
        '404':
          description: Equipment not found
    delete:
      operationId: deleteEquipment
      summary: Delete an equipment
      description: Remove an equipment from the system
      tags:
        - Equipment
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: ID of the equipment
      responses:
        '204':
          description: Equipment deleted
        '404':
          description: Equipment not found
  /equipments/{id}/hours:
    put:
      operationId: updateEquipmentHours
      summary: Update an equipment's hour-meter reading
      description: >
        Explicit hour-meter freshness confirmation. Sets the equipment's hours
        to the submitted value (which must be greater than or equal to the
        current value) and always refreshes hours_updated_at to now, even when
        the value is unchanged. Used to dismiss the Dashboard freshness reminder.
      tags:
        - Equipment
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: ID of the equipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentHoursInput'
      responses:
        '200':
          description: Hour-meter updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Equipment'
        '400':
          description: Invalid input (equipment does not track hours, or value below current)
        '404':
          description: Equipment not found
  /equipments/{equipment_id}/files:
    get:
      operationId: listEquipmentFiles
      summary: List documents attached to an equipment
      description: Retrieve all documents attached to an equipment
      tags:
        - Equipment
      parameters:
        - in: path
          name: equipment_id
          schema:
            type: integer
          required: true
          description: ID of the equipment
      responses:
        '200':
          description: A list of attached documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileInfo'
        '404':
          description: Equipment not found
    post:
      operationId: uploadEquipmentFile
      summary: Upload a document to an equipment
      description: Attach a new document to an equipment. Any file type is accepted, up to 25 MB.
      tags:
        - Equipment
      parameters:
        - in: path
          name: equipment_id
          schema:
            type: integer
          required: true
          description: ID of the equipment
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: The document to upload
      responses:
        '201':
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileInfo'
        '404':
          description: Equipment not found
        '413':
          description: File exceeds the maximum allowed size
  /equipments/{equipment_id}/files/{filename}:
    get:
      operationId: getEquipmentFile
      summary: Download an attached document
      description: Serve the raw bytes of an attached document as a download.
      tags:
        - Equipment
      parameters:
        - in: path
          name: equipment_id
          schema:
            type: integer
          required: true
          description: ID of the equipment
        - in: path
          name: filename
          schema:
            type: string
          required: true
          description: Stored filename of the document (the File.name value)
      responses:
        '200':
          description: The document bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Document not found
    delete:
      operationId: deleteEquipmentFile
      summary: Delete an attached document
      description: Remove an attached document from the equipment.
      tags:
        - Equipment
      parameters:
        - in: path
          name: equipment_id
          schema:
            type: integer
          required: true
          description: ID of the equipment
        - in: path
          name: filename
          schema:
            type: string
          required: true
          description: Stored filename of the document (the File.name value)
      responses:
        '204':
          description: Document deleted
        '404':
          description: Document not found
  /equipments/{equipment_id}/tasks:
    get:
      operationId: listTasksByEquipment
      summary: List tasks for an equipment
      description: Retrieve all tasks associated with an equipment
      tags:
        - Task
      parameters:
        - in: path
          name: equipment_id
          schema:
            type: integer
          required: true
          description: ID of the equipment
      responses:
        '200':
          description: A list of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
  /tasks:
    get:
      operationId: listTasks
      summary: List all tasks
      description: Retrieve a list of all tasks
      tags:
        - Task
      responses:
        '200':
          description: A list of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
    post:
      operationId: createTask
      summary: Create a new task
      description: Add a new task to the system
      tags:
        - Task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskInput'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid input
  /tasks/{id}:
    get:
      operationId: getTask
      summary: Get task by ID
      description: Retrieve a single task by its ID
      tags:
        - Task
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: ID of the task
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found
    put:
      operationId: updateTask
      summary: Update a task
      description: Update an existing task
      tags:
        - Task
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: ID of the task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskInput'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid input
        '404':
          description: Task not found
    delete:
      operationId: deleteTask
      summary: Delete a task
      description: Remove a task from the system
      tags:
        - Task
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: ID of the task
      responses:
        '204':
          description: Task deleted
        '404':
          description: Task not found
  /tasks/{task_id}/interventions:
    get:
      operationId: listInterventionsByTask
      summary: List interventions for a task
      description: Retrieve all interventions associated with a task
      tags:
        - Intervention
      parameters:
        - in: path
          name: task_id
          schema:
            type: integer
          required: true
          description: ID of the task
      responses:
        '200':
          description: A list of interventions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Intervention'
  /interventions:
    get:
      operationId: listInterventions
      summary: List all interventions
      description: Retrieve a list of all interventions
      tags:
        - Intervention
      responses:
        '200':
          description: A list of interventions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Intervention'
    post:
      operationId: createIntervention
      summary: Create a new intervention
      description: Add a new intervention to the system
      tags:
        - Intervention
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InterventionInput'
      responses:
        '201':
          description: Intervention created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Intervention'
        '400':
          description: Invalid input
  /interventions/{id}:
    get:
      operationId: getIntervention
      summary: Get intervention by ID
      description: Retrieve a single intervention by its ID
      tags:
        - Intervention
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: ID of the intervention
      responses:
        '200':
          description: Intervention details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Intervention'
        '404':
          description: Intervention not found
    put:
      operationId: updateIntervention
      summary: Update an intervention
      description: Update an existing intervention
      tags:
        - Intervention
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: ID of the intervention
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InterventionInput'
      responses:
        '200':
          description: Intervention updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Intervention'
        '400':
          description: Invalid input
        '404':
          description: Intervention not found
    delete:
      operationId: deleteIntervention
      summary: Delete an intervention
      description: Remove an intervention from the system
      tags:
        - Intervention
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: ID of the intervention
      responses:
        '204':
          description: Intervention deleted
        '404':
          description: Intervention not found
  /interventions/{id}/files:
    get:
      operationId: listInterventionFiles
      summary: List photos attached to an intervention
      description: Retrieve all photos attached to an intervention.
      tags:
        - Intervention
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: ID of the intervention
      responses:
        '200':
          description: A list of attached photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileInfo'
        '404':
          description: Intervention not found
    post:
      operationId: uploadInterventionFile
      summary: Upload a photo to an intervention
      description: Attach a new photo to an intervention. Only image files are accepted (JPEG, PNG, WebP, GIF), up to 10 MB.
      tags:
        - Intervention
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: ID of the intervention
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: The photo to upload
      responses:
        '201':
          description: Photo uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileInfo'
        '404':
          description: Intervention not found
        '413':
          description: File exceeds the maximum allowed size
        '415':
          description: Unsupported media type
  /interventions/{id}/files/{filename}:
    get:
      operationId: getInterventionFile
      summary: Serve an attached photo
      description: Serve the raw bytes of an attached photo inline so it can be displayed.
      tags:
        - Intervention
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: ID of the intervention
        - in: path
          name: filename
          schema:
            type: string
          required: true
          description: Stored filename of the photo (the FileInfo.name value)
      responses:
        '200':
          description: The photo bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Photo not found
    delete:
      operationId: deleteInterventionFile
      summary: Delete an attached photo
      description: Remove an attached photo from the intervention.
      tags:
        - Intervention
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: ID of the intervention
        - in: path
          name: filename
          schema:
            type: string
          required: true
          description: Stored filename of the photo (the FileInfo.name value)
      responses:
        '204':
          description: Photo deleted
        '404':
          description: Photo not found
components:
  schemas:
    Equipment:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the equipment
        name:
          type: string
          description: Name of the equipment
        description:
          type: string
          description: Detailed description of the equipment
        commissioned_at:
          type: string
          format: date
          description: Date the equipment was put into service (YYYY-MM-DD). Optional.
        icon:
          type: string
          description: Emoji marker for the equipment, shown wherever it is referenced. Defaults to 🔧.
        tracks_hours:
          type: boolean
          description: Whether this equipment uses an hour-meter
          default: false
        hours:
          type: number
          description: Current hour-meter value. Only relevant if tracks_hours is true
        hours_updated_at:
          type: string
          format: date-time
          description: When the hour-meter was last updated. Only relevant if tracks_hours is true
        created_at:
          type: string
          format: date-time
          description: When the equipment was created
        updated_at:
          type: string
          format: date-time
          description: When the equipment was last updated
    EquipmentInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the equipment
        description:
          type: string
          description: Detailed description of the equipment
        commissioned_at:
          type: string
          format: date
          description: Date the equipment was put into service (YYYY-MM-DD). Optional.
        icon:
          type: string
          description: Emoji marker for the equipment. Defaults to 🔧 when omitted.
        tracks_hours:
          type: boolean
          description: Whether this equipment uses an hour-meter
          default: false
        hours:
          type: number
          description: Current hour-meter value. Only relevant if tracks_hours is true
    EquipmentHoursInput:
      type: object
      required:
        - hours
      properties:
        hours:
          type: number
          description: New hour-meter reading. Must be greater than or equal to the current value.
    Task:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the task
        equipment_id:
          type: integer
          description: ID of the associated equipment
        name:
          type: string
          description: Name of the task
        description:
          type: string
          description: Detailed description of the task
        hours_interval:
          type: integer
          description: Interval in hours for the task
        months_interval:
          type: integer
          description: Interval in months for the task
        due_status:
          type: string
          description: Computed due status (overdue, due_soon, ok)
          enum:
            - overdue
            - due_soon
            - ok
        next_due_date:
          type: string
          format: date
          description: Next calendar due date based on months_interval
        next_due_hours:
          type: number
          description: Next hour-meter threshold based on hours_interval
        created_at:
          type: string
          format: date-time
          description: When the task was created
        updated_at:
          type: string
          format: date-time
          description: When the task was last updated
    TaskInput:
      type: object
      required:
        - equipment_id
        - name
      properties:
        equipment_id:
          type: integer
          description: ID of the associated equipment
        name:
          type: string
          description: Name of the task
        description:
          type: string
          description: Detailed description of the task
        hours_interval:
          type: integer
          description: Interval in hours for the task
        months_interval:
          type: integer
          description: Interval in months for the task
    Intervention:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the intervention
        task_id:
          type: integer
          nullable: true
          description: ID of the associated task. Absent for exceptional interventions.
        equipment_id:
          type: integer
          nullable: true
          description: ID of the associated equipment. Auto-populated from task for standard interventions.
        exceptional_label:
          type: string
          description: Short description of the exceptional operation. Present only for exceptional interventions.
        date:
          type: string
          format: date-time
          description: Date of the intervention
        location:
          type: string
          description: Location where the intervention was performed
        performed_by:
          type: string
          description: Person or company who performed the intervention
        comments:
          type: string
          description: Additional comments about the intervention
        hours_at:
          type: number
          description: Equipment hour-meter reading at the time of intervention. Only relevant if the equipment tracks hours
        created_at:
          type: string
          format: date-time
          description: When the intervention was created
        updated_at:
          type: string
          format: date-time
          description: When the intervention was last updated
        photo_count:
          type: integer
          description: Number of photos attached to the intervention
          readOnly: true
    FileInfo:
      type: object
      required:
        - name
        - original_name
        - size
        - mime_type
        - uploaded_at
        - url
      properties:
        name:
          type: string
          description: Stored filename, used as the {filename} URL segment
          example: "abc123.pdf"
        original_name:
          type: string
          description: Filename as uploaded by the user
          example: "manual.pdf"
        size:
          type: integer
          format: int64
          description: Size of the file in bytes
        mime_type:
          type: string
          description: Detected MIME type of the file
          example: "application/pdf"
        uploaded_at:
          type: string
          format: date-time
          description: When the file was uploaded
        url:
          type: string
          description: Relative URL to download the file
          example: "/api/equipments/12/files/abc123.pdf"
    VersionInfo:
      type: object
      required:
        - version
      properties:
        version:
          type: string
          description: Application version derived from git tag
          example: "v0.1.0"
    UpdateStatus:
      type: object
      required:
        - current_version
        - latest_version
        - update_available
      properties:
        current_version:
          type: string
          description: Currently running version
          example: "v0.2.1"
        latest_version:
          type: string
          description: Latest version available on GitHub. Empty string if the check failed.
          example: "v0.3.0"
        update_available:
          type: boolean
          description: Whether a newer version is available
        release_url:
          type: string
          description: GitHub release page URL. Empty if no update is available.
          example: "https://github.com/vtellier/OpenMaintenance/releases/tag/v0.3.0"
    InterventionInput:
      type: object
      required:
        - date
      description: >
        Either task_id (standard intervention) or both equipment_id and exceptional_label
        (exceptional intervention) must be provided.
      properties:
        task_id:
          type: integer
          description: ID of the associated task. Omit for exceptional interventions.
        equipment_id:
          type: integer
          description: ID of the equipment. Required for exceptional interventions; auto-populated from task for standard ones.
        exceptional_label:
          type: string
          description: Short description of the exceptional operation. Required when task_id is absent.
        date:
          type: string
          format: date-time
          description: Date of the intervention
        location:
          type: string
          description: Location where the intervention was performed
        performed_by:
          type: string
          description: Person or company who performed the intervention
        comments:
          type: string
          description: Additional comments about the intervention
        hours_at:
          type: number
          description: Equipment hour-meter reading at the time of intervention. Only relevant if the equipment tracks hours
