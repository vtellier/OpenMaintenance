<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenMaintenance</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">OpenMaintenance</h1>
        
        <!-- Navigation -->
        <nav class="mb-6">
            <div class="flex space-x-4">
                <button 
                    hx-get="/equipments-view" 
                    hx-target="#main-content"
                    hx-swap="innerHTML"
                    class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                    Equipments
                </button>
                <button 
                    hx-get="/tasks-view" 
                    hx-target="#main-content"
                    hx-swap="innerHTML"
                    class="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">
                    Tasks
                </button>
                <button 
                    hx-get="/interventions-view" 
                    hx-target="#main-content"
                    hx-swap="innerHTML"
                    class="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">
                    Interventions
                </button>
            </div>
        </nav>
        
        <!-- Main Content -->
        <div id="main-content" class="bg-white p-6 rounded-lg shadow">
            <p>Select a section from the navigation above.</p>
        </div>
    </div>
</body>
</html>
