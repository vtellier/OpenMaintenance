name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install oapi-codegen
        run: go install github.com/deepmap/oapi-codegen/cmd/oapi-codegen@v1.16.3

      - name: Generate OpenAPI clients
        run: make generate-openapi && cd frontend && pnpm run generate:api

      - name: Build
        run: make build

      - name: Build Windows binary
        run: make build-backend-windows-amd64

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: openmaintenance-linux-amd64
          path: backend/bin/openmaintenance

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: openmaintenance-windows-amd64
          path: backend/bin/openmaintenance.exe

  release:
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: openmaintenance-linux-amd64

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: openmaintenance-windows-amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            openmaintenance
            openmaintenance.exe
          generate_release_notes: true
